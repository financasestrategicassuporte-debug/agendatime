<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rotinas da Equipe · Gestão Fitness Brasil</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/style.css" />
</head>
<body>

<div class="wrap">

  <header class="top">
    <div class="brand-row">
      <span class="brand-mark"></span>
      <span class="brand-name">Gestão Fitness Brasil</span>
      <a class="brand-link" href="admin.html">Admin</a>
    </div>
    <h1 class="title">Rotinas da <span class="accent">Equipe</span></h1>
    <div class="top-meta">
      <p>Visão semanal das rotinas de SDR, Closer e Customer Success. Clique em "Ver agenda" para abrir a agenda individual de cada pessoa.</p>
      <span id="now-display"></span>
    </div>
  </header>

  <div class="legend" id="legend"></div>

  <main id="content">
    <p class="muted">Carregando...</p>
  </main>

  <footer>
    <span>Gestão Fitness Brasil — rotinas internas</span>
    <span>Painel administrativo: <a href="admin.html">/admin.html</a></span>
  </footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/supabase-client.js"></script>
<script src="assets/board.js"></script>
<script>
function updateNowDisplay() {
  const now = new Date();
  const formatted = new Intl.DateTimeFormat("pt-BR", { weekday: "long", day: "numeric", month: "long" }).format(now);
  const time = now.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
  document.getElementById("now-display").textContent = formatted + " · " + time;
}

function memberFirstName(name) {
  return name.split(" ")[0];
}

function renderUpcomingEvents(events) {
  const section = document.createElement("section");
  section.className = "role-section";

  const headRow = document.createElement("div");
  headRow.className = "role-head";
  const h2 = document.createElement("h2");
  h2.textContent = "Próximos Eventos";
  const line = document.createElement("div");
  line.className = "role-line";
  const count = document.createElement("span");
  count.className = "role-count";
  count.textContent = (events.length === 1 ? "1 evento" : events.length + " eventos") + " · próximos 14 dias";
  headRow.appendChild(h2);
  headRow.appendChild(line);
  headRow.appendChild(count);
  section.appendChild(headRow);

  if (!events.length) {
    const empty = document.createElement("div");
    empty.className = "empty-state";
    empty.textContent = "Nenhum evento agendado nos próximos 14 dias.";
    section.appendChild(empty);
    return section;
  }

  events.forEach(ev => {
    const card = document.createElement("article");
    card.className = "event-card";
    const timeStr = ev.is_all_day ? "Dia inteiro" : `${ev.start_time.slice(0, 5)}–${ev.end_time.slice(0, 5)}`;
    const badge = eventBadge(ev);

    if (ev.is_private) {
      const main = document.createElement("div");
      const date = document.createElement("div");
      date.className = "event-date";
      date.textContent = `${formatDateDisplay(ev.event_date)} · ${timeStr}`;
      const h4 = document.createElement("h4");
      h4.textContent = "🔒 Evento privado";
      if (badge) {
        const bd = document.createElement("span");
        bd.className = "ev-badge " + badge.cls;
        bd.textContent = badge.label;
        h4.appendChild(bd);
      }
      const p = document.createElement("p");
      p.textContent = `${ev.team_members?.name || "Alguém"} está ocupado(a) neste horário.`;
      main.appendChild(date);
      main.appendChild(h4);
      main.appendChild(p);
      card.appendChild(main);
      section.appendChild(card);
      return;
    }

    const main = document.createElement("div");
    main.style.flex = "1";
    const date = document.createElement("div");
    date.className = "event-date";
    date.textContent = `${formatDateDisplay(ev.event_date)} · ${timeStr}`;
    const h4 = document.createElement("h4");
    h4.textContent = ev.title;
    if (badge) {
      const bd = document.createElement("span");
      bd.className = "ev-badge " + badge.cls;
      bd.textContent = badge.label;
      h4.appendChild(bd);
    }
    main.appendChild(date);
    main.appendChild(h4);

    if (ev.location) {
      const l = document.createElement("p");
      l.style.color = "var(--green)";
      l.textContent = "📍 " + ev.location;
      main.appendChild(l);
    }
    if (ev.description) {
      const p = document.createElement("p");
      p.textContent = ev.description;
      main.appendChild(p);
    }

    const attendees = document.createElement("div");
    attendees.className = "attendee-list";
    const creator = document.createElement("span");
    creator.className = "chip";
    const cav = document.createElement("span");
    cav.className = "avatar small";
    cav.textContent = ev.team_members?.initials || "?";
    creator.appendChild(cav);
    creator.append(" " + (ev.team_members?.name || "—") + " (org.)");
    attendees.appendChild(creator);
    (ev.event_attendees || []).forEach(a => {
      if (!a.team_members) return;
      const chip = document.createElement("span");
      chip.className = "chip";
      const av = document.createElement("span");
      av.className = "avatar small";
      av.textContent = a.team_members.initials;
      chip.appendChild(av);
      chip.append(" " + a.team_members.name);
      attendees.appendChild(chip);
    });
    main.appendChild(attendees);

    card.appendChild(main);
    section.appendChild(card);
  });

  return section;
}

async function init() {
  renderLegend(document.getElementById("legend"));
  updateNowDisplay();
  setInterval(updateNowDisplay, 60000);

  const content = document.getElementById("content");

  let members, blocks, events;
  try {
    [members, blocks, events] = await Promise.all([fetchTeamMembers(), fetchAllRoutineBlocks(), fetchUpcomingEvents(14)]);
  } catch (err) {
    content.innerHTML = `<div class="empty-state">Não foi possível carregar os dados. Verifique a configuração do Supabase em <code>assets/supabase-client.js</code>.<br><span class="muted">${err.message || err}</span></div>`;
    return;
  }

  content.innerHTML = "";

  content.appendChild(renderUpcomingEvents(events));

  const blocksByMember = {};
  blocks.forEach(b => {
    if (!blocksByMember[b.team_member_id]) blocksByMember[b.team_member_id] = [];
    blocksByMember[b.team_member_id].push(b);
  });

  const todayDay = new Date().getDay();

  ROLES.forEach(role => {
    const roleMembers = members.filter(m => m.role === role.key);
    if (roleMembers.length === 0) return;

    const section = document.createElement("section");
    section.className = "role-section";

    const headRow = document.createElement("div");
    headRow.className = "role-head";

    const h2 = document.createElement("h2");
    h2.textContent = role.label;

    const line = document.createElement("div");
    line.className = "role-line";

    const count = document.createElement("span");
    count.className = "role-count";
    count.textContent = roleMembers.length + (roleMembers.length === 1 ? " pessoa" : " pessoas");

    headRow.appendChild(h2);
    headRow.appendChild(line);
    headRow.appendChild(count);
    section.appendChild(headRow);

    roleMembers.forEach(member => {
      const card = document.createElement("article");
      card.className = "member-card";

      const head = document.createElement("div");
      head.className = "member-head";

      const idBox = document.createElement("div");
      idBox.className = "member-id";

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = member.initials;

      const nameBox = document.createElement("div");
      const name = document.createElement("h3");
      name.textContent = member.name;

      const roleTag = document.createElement("span");
      roleTag.className = "role-tag " + member.role;
      roleTag.textContent = ROLE_LABELS[member.role];

      nameBox.appendChild(name);
      nameBox.appendChild(roleTag);

      idBox.appendChild(avatar);
      idBox.appendChild(nameBox);

      const link = document.createElement("a");
      link.className = "btn";
      link.href = `agenda.html?p=${member.slug}`;
      link.textContent = "Ver agenda de " + memberFirstName(member.name) + " ↗";

      head.appendChild(idBox);
      head.appendChild(link);

      card.appendChild(head);
      card.appendChild(renderBoard(groupBlocksByDay(blocksByMember[member.id] || []), todayDay));

      section.appendChild(card);
    });

    content.appendChild(section);
  });

  if (members.length === 0) {
    content.innerHTML = `<div class="empty-state">Nenhuma pessoa cadastrada ainda. Acesse o <a href="admin.html">painel administrativo</a> para adicionar o time.</div>`;
  }
}

init();
</script>

</body>
</html>
